        async function updateDashboardChart() {
            const desa = document.getElementById('dash-desa').value;
            const tahunSelected = document.getElementById('dash-tahun').value;
            const analysisLoader = document.getElementById('analysis-loader');
            const analysisGrid = document.getElementById('analysis-grid');
            const currentLevel = currentState.grafikLevel;

            if(analysisLoader) analysisLoader.classList.remove('hidden');
            if(analysisGrid) analysisGrid.innerHTML = '';
            
            let query = db.collection('data_pemilu').where('tipe', '==', 'PILEG');
            if (desa) query = query.where('desa', '==', desa);

            const snapshot = await query.get();
            const dataMapSelected = {};
            const data2019 = {};
            const data2024 = {};
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const docLevel = d.level || 'KABUPATEN';
                
                if (currentLevel === 'KABUPATEN') {
                    if (docLevel !== 'KABUPATEN') return; 
                } else {
                    if (docLevel !== currentLevel) return;
                }

                const partai = (d.partai || '').toUpperCase().trim();
                const suara = parseInt(d.suara) || 0;
                const thn = d.tahun;

                if (thn === '2019') data2019[partai] = (data2019[partai] || 0) + suara;
                if (thn === '2024') data2024[partai] = (data2024[partai] || 0) + suara;
                if (thn === tahunSelected) dataMapSelected[partai] = (dataMapSelected[partai] || 0) + suara;
            });

            let chartData = Object.keys(dataMapSelected).map(key => ({
                label: key,
                value: dataMapSelected[key],
                color: getPartaiColor(key) 
            }));

            chartData.sort((a, b) => b.value - a.value);

            const labels = chartData.map(d => d.label);
            const values = chartData.map(d => d.value);
            const colors = chartData.map(d => d.color);

            const ctx = document.getElementById('voteChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Jumlah Suara ${tahunSelected}`,
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#000',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });

            if(analysisLoader) analysisLoader.classList.add('hidden');
            
            const allFoundParties = new Set([...Object.keys(data2019), ...Object.keys(data2024)]);
            let analysisHTML = '';
            const sortedParties = Array.from(allFoundParties).sort((a, b) => (data2024[b] || 0) - (data2024[a] || 0));

            sortedParties.forEach(partai => {
                const suara19 = data2019[partai] || 0;
                const suara24 = data2024[partai] || 0;
                const diff = suara24 - suara19;
                const color = getPartaiColor(partai);
                
                let percent = 0;
                if (suara19 > 0) {
                    percent = ((diff / suara19) * 100).toFixed(1);
                } else if (suara24 > 0) {
                    percent = 100;
                }

                let trendColor = 'text-gray-500';
                let trendIcon = 'fa-minus';
                let bgClass = 'bg-gray-50';
                let trendText = 'Stabil';

                if (diff > 0) {
                    trendColor = 'text-green-600';
                    trendIcon = 'fa-arrow-up';
                    bgClass = 'bg-green-50 border-green-200';
                    trendText = `+${percent}%`;
                } else if (diff < 0) {
                    trendColor = 'text-red-600';
                    trendIcon = 'fa-arrow-down';
                    bgClass = 'bg-red-50 border-red-200';
                    trendText = `${percent}%`;
                }

                if (suara19 > 0 || suara24 > 0) {
                    analysisHTML += `
                        <div class="border rounded-lg p-4 shadow-sm hover:shadow-md transition ${bgClass} relative overflow-hidden">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-gray-800 text-sm uppercase truncate w-3/4" title="${partai}">${partai}</h3>
                                <div class="w-3 h-3 rounded-full" style="background-color: ${color}"></div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <div class="text-xs text-gray-500">2019</div>
                                    <div class="font-semibold text-gray-700">${suara19.toLocaleString()}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500">2024</div>
                                    <div class="font-bold text-lg">${suara24.toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="mt-3 pt-2 border-t border-gray-200 flex justify-between items-center">
                                <span class="text-xs text-gray-500">Selisih: ${diff > 0 ? '+' : ''}${diff.toLocaleString()}</span>
                                <span class="font-bold text-sm ${trendColor} flex items-center bg-white px-2 py-1 rounded shadow-sm">
                                    <i class="fas ${trendIcon} mr-1 text-xs"></i> ${trendText}
                                </span>
                            </div>
                        </div>
                    `;
                }
            });

            if (analysisHTML === '') {
                analysisHTML = '<div class="col-span-full text-center text-gray-500 py-4">Belum ada data untuk kategori ini.</div>';
            }

            if(analysisGrid) analysisGrid.innerHTML = analysisHTML;
        }

        function loadData(collectionName, keys, useFilterDesa, useFilterDusun) {
            if (unsubscribe) unsubscribe();
            
            let query = db.collection(collectionName);
            const desaVal = useFilterDesa ? document.getElementById('filter-desa').value : null;
            if (useFilterDesa && desaVal) query = query.where('desa', '==', desaVal);

            unsubscribe = query.onSnapshot(snapshot => {
                const tbody = document.getElementById('table-body');
                if(!tbody) return;
                tbody.innerHTML = '';

                let docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

                if (useFilterDusun) {
                    const dusunVal = document.getElementById('filter-dusun').value.toLowerCase();
                    if (dusunVal) docs = docs.filter(d => (d.dusun || '').toLowerCase().includes(dusunVal));
                }

                if (collectionName === 'data_desa') {
                    const jabatanOrder = ["Kades", "staf", "Kasun", "Ketua RW", "Ketua RT"];
                    docs.sort((a, b) => {
                        if (a.desa < b.desa) return -1;
                        if (a.desa > b.desa) return 1;
                        let idxA = jabatanOrder.findIndex(j => j.toLowerCase() === (a.jabatan || '').toLowerCase());
                        let idxB = jabatanOrder.findIndex(j => j.toLowerCase() === (b.jabatan || '').toLowerCase());
                        if (idxA === -1) idxA = 999;
                        if (idxB === -1) idxB = 999;
                        return idxA - idxB;
                    });
                } else {
                    docs.sort((a, b) => (parseInt(a.no) || 0) - (parseInt(b.no) || 0));
                }

                if (docs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="${keys.length + (isGuestMode ? 0 : 1)}" class="text-center py-4 text-gray-500">Tidak ada data. Silahkan tambah data.</td></tr>`;
                    return;
                }

                docs.forEach(data => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 border-b';
                    let cells = '';
                    keys.forEach(key => cells += `<td class="border px-4 py-2 text-sm">${data[key] || '-'}</td>`);
                    
                    // GUEST MODE: HIDE ACTIONS
                    if (!isGuestMode) {
                        cells += `<td class="border px-4 py-2 text-center">
                                <button onclick="openModal('${collectionName}', '${data.id}')" class="text-blue-600 hover:text-blue-800 mx-1"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteData('${collectionName}', '${data.id}')" class="text-red-600 hover:text-red-800 mx-1"><i class="fas fa-trash"></i></button>
                            </td>`;
                    }
                    row.innerHTML = cells;
                    tbody.appendChild(row);
                });
            });
        }

        // --- LOAD DATA PEMILU DENGAN GROUPING (ROWSPAN) ---
        function loadPemiluDataNew() {
            if (unsubscribe) unsubscribe();
            const desa = document.getElementById('filter-desa').value;
            const tahun = document.getElementById('filter-tahun').value;
            const currentLevel = currentState.pemiluLevel;

            let query = db.collection('data_pemilu');
            if(desa) query = query.where('desa', '==', desa);
            if(tahun) query = query.where('tahun', '==', tahun);

            unsubscribe = query.onSnapshot(snapshot => {
                const pilegBody = document.getElementById('tbody-pileg');
                const pilkadaBody = document.getElementById('tbody-pilkada');
                
                let docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

                const pilegDocs = docs.filter(d => {
                    if (d.tipe !== 'PILEG') return false;
                    const docLevel = d.level || 'KABUPATEN'; 
                    return docLevel === currentLevel;
                });

                const pilkadaDocs = docs.filter(d => d.tipe === 'PILKADA');

                if (pilegBody) {
                    pilegBody.innerHTML = '';
                    if (pilegDocs.length === 0) {
                        pilegBody.innerHTML = `<tr><td colspan="${isGuestMode ? 7 : 8}" class="text-center py-4 text-gray-500">Tidak ada data Pileg untuk kategori ini.</td></tr>`;
                    } else {
                        const groups = {};
                        pilegDocs.forEach(d => {
                            const key = `${d.desa}_${d.tahun}`;
                            if (!groups[key]) groups[key] = [];
                            groups[key].push(d);
                        });

                        const partyOrder = (currentLevel === 'PROVINSI' || currentLevel === 'RI') 
                                           ? DATA_MASTER.partai_prov_ri

                        const sortedKeys = Object.keys(groups).sort();

                        sortedKeys.forEach(key => {
                            const items = groups[key];
                            items.sort((a, b) => {
                                let idxA = partyOrder.indexOf(a.partai);
                                let idxB = partyOrder.indexOf(b.partai);
                                if (idxA === -1) idxA = 999;
                                if (idxB === -1) idxB = 999;

                                const color = getPartaiColor(item.partai);

                                    <td class="border px-4 py-2 text-right">${parseInt(item.suara).toLocaleString()}</td>

                                            <button onclick="deleteData('data_pemilu', '${item.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>

        // --- UPDATED: LOAD TPS MATRIX DENGAN HEADER DUSUN MERGED & GARIS BATAS ---
        function loadTPSMatrix() {
            if (unsubscribe) unsubscribe();
            const desa = document.getElementById('filter-desa-tps').value;
            const kategori = currentState.tpsKategori;

            if(!desa) {
                document.getElementById('matrix-2024').innerHTML = '<tr><td colspan="50" class="p-4 text-center text-gray-500">Pilih Desa terlebih dahulu.</td></tr>';
                document.getElementById('matrix-2019').innerHTML = '<tr><td colspan="50" class="p-4 text-center text-gray-500">Pilih Desa terlebih dahulu.</td></tr>';
                return;
            }

            const maxTps = DATA_MASTER.tps_limit[desa] || 46;
            const dusunList = DUSUN_MAPPING[desa] || [];

            // --- GENERATE DOUBLE ROW HEADER ---
            const generateHeader = () => {
                // Determine boundaries
                const boundaryTps = new Set();
                dusunList.forEach((d, index) => {
                    if(index < dusunList.length - 1) boundaryTps.add(d.range[1]);
                });

                // ROW 1: Dusun Header (Merged)
                let row1 = `<tr><th class="border p-2 sticky-col min-w-[120px] bg-white text-gray-800 font-extrabold" rowspan="2" style="vertical-align:middle;">PARTAI</th>`;
                
                if (dusunList.length > 0) {
                    dusunList.forEach((d, index) => {
                        const count = d.range[1] - d.range[0] + 1;
                        // Add border style to header 1
                        const style = index < dusunList.length - 1 ? 'border-right: 4px solid #000;' : '';
                        row1 += `<th class="dusun-header" colspan="${count}" style="${style}">${d.name}</th>`;
                    });
                } else {
                    row1 += `<th class="bg-gray-50 border-b border-gray-200" colspan="${maxTps}"></th>`;
                }
                row1 += `</tr>`;

                // ROW 2: Nomor TPS
                let row2 = `<tr>`;
                for(let i=1; i<=maxTps; i++) {
                    const style = boundaryTps.has(i) ? 'border-right: 4px solid #000;' : '';
                    row2 += `<th class="border px-1 min-w-[35px] bg-gray-50 text-xs font-semibold text-gray-600" style="${style}">${i}</th>`;
                }
                row2 += `</tr>`;
                
                return row1 + row2;
            };

            document.getElementById('thead-2024').innerHTML = generateHeader();
            document.getElementById('thead-2019').innerHTML = generateHeader();

            unsubscribe = db.collection('data_tps_detail').where('desa', '==', desa).onSnapshot(snapshot => {
                let data2024 = {};
                let data2019 = {};
                
                const partaiList = getPartaiListForTPS();

                partaiList.forEach(p => {
                    data2024[p] = Array(maxTps + 1).fill({val:0, id:null});
                    data2019[p] = Array(maxTps + 1).fill({val:0, id:null});
                });

                bulkDataCache = { '2024': {}, '2019': {} };

                snapshot.forEach(doc => {
                    const d = doc.data();
                    let dataKategori = d.kategori || 'DPRD';
                    
                    if (dataKategori === kategori) {
                        const tps = parseInt(d.no_tps);
                        const partai = d.partai;
                        const suara = parseInt(d.suara) || 0;
                        
                        if(tps >= 1 && tps <= maxTps && partaiList.includes(partai)) {
                            if(d.tahun === '2024') data2024[partai][tps] = {val: suara, id: doc.id};
                            if(d.tahun === '2019') data2019[partai][tps] = {val: suara, id: doc.id};
                        }
                    }
                });

                bulkDataCache['2024'] = data2024;
                bulkDataCache['2019'] = data2019;

                renderMatrixRows('matrix-2024', data2024, maxTps, '2024');
                renderMatrixRows('matrix-2019', data2019, maxTps, '2019');
            });
        }

        function renderMatrixRows(elementId, dataSet, maxTps, year) {
            const tbody = document.getElementById(elementId);
            tbody.innerHTML = '';
            
            const isBulk = currentState.bulkEditMode;
            const partaiList = getPartaiListForTPS();

            // --- HITUNG BATAS DUSUN UNTUK GARIS TEBAL ---
            const desa = document.getElementById('filter-desa-tps').value;
            const dusunList = DUSUN_MAPPING[desa] || [];
            const boundaryTps = new Set();
            dusunList.forEach((d, index) => {
                 if(index < dusunList.length - 1) boundaryTps.add(d.range[1]);
            });
            // -------------------------------------------

            partaiList.forEach(partai => {
                // Gunakan helper getPartaiColor untuk konsistensi
                let color = getPartaiColor(partai);
                let rowHTML = `<tr class="hover:bg-gray-50 border-b">
                    <td class="border p-2 sticky-col font-bold text-left whitespace-nowrap text-xs" style="border-left: 4px solid ${color}">${partai}</td>`;
                
                for(let i=1; i<=maxTps; i++) {
                    let cellData = dataSet[partai][i];
                    let val = cellData.val;
                    let docId = cellData.id;

                    // STYLE GARIS TEBAL
                    let tdStyle = boundaryTps.has(i) ? 'border-right: 4px solid #000;' : 'border-right: 1px solid #e5e7eb;';

                    if (isBulk) {
                        rowHTML += `<td class="border-b border-t" style="${tdStyle} padding:0;">
                            <input type="number" 
                                class="bulk-input" 
                                data-partai="${partai}" 
                                data-tps="${i}" 
                                data-year="${year}" 
                                data-docid="${docId || ''}"
                                value="${val === 0 ? '' : val}"
                                onpaste="handlePaste(event, this)">
                        </td>`;
                    } else {
                        let displayVal = val === 0 ? '-' : val;
                        let cellClass = val > 0 ? 'font-bold text-gray-800' : 'text-gray-300';
                        // Add border classes for top/bottom, handle right via style
                        rowHTML += `<td class="border-b border-t px-1 ${cellClass}" style="${tdStyle}">${displayVal}</td>`;
                    }
                }
                rowHTML += '</tr>';
                tbody.innerHTML += rowHTML;
            });
        }

        function toggleBulkEditMode() {
            currentState.bulkEditMode = !currentState.bulkEditMode;
            const btn = document.getElementById('btn-bulk-mode');
            const controls = document.getElementById('bulk-save-controls');
            
            if(currentState.bulkEditMode) {
                btn.innerHTML = '<i class="fas fa-times mr-2"></i>Batal Edit';
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-800');
                btn.classList.add('bg-gray-500', 'hover:bg-gray-700');
                controls.classList.remove('hidden');
            } else {
                btn.innerHTML = '<i class="fas fa-table mr-2"></i>Mode Input Massal (Copy-Paste)';
                btn.classList.add('bg-blue-600', 'hover:bg-blue-800');
                btn.classList.remove('bg-gray-500', 'hover:bg-gray-700');
                controls.classList.add('hidden');
            }
            
            const desa = document.getElementById('filter-desa-tps').value;
            const maxTps = DATA_MASTER.tps_limit[desa] || 46;
            renderMatrixRows('matrix-2024', bulkDataCache['2024'], maxTps, '2024');
            renderMatrixRows('matrix-2019', bulkDataCache['2019'], maxTps, '2019');
        }

        function handlePaste(e, targetInput) {
            e.preventDefault();
            const clipboardData = e.clipboardData || window.clipboardData;
            const pastedData = clipboardData.getData('Text');
            
            const rows = pastedData.trim().split(/\r\n|\n|\r/);
            const startPartai = targetInput.getAttribute('data-partai');
            const startTps = parseInt(targetInput.getAttribute('data-tps'));
            const year = targetInput.getAttribute('data-year');
            const desa = document.getElementById('filter-desa-tps').value;
            const maxTps = DATA_MASTER.tps_limit[desa] || 46;
            
            const partaiKeys = getPartaiListForTPS();
            let startPartaiIdx = partaiKeys.indexOf(startPartai);

            rows.forEach((rowStr, rIdx) => {
                const cols = rowStr.split('\t');
                const currentPartai = partaiKeys[startPartaiIdx + rIdx];
                
                if (currentPartai) {
                    cols.forEach((val, cIdx) => {
                        const currentTps = startTps + cIdx;
                        if (currentTps <= maxTps) {
                            const inputEl = document.querySelector(`input[data-partai="${currentPartai}"][data-tps="${currentTps}"][data-year="${year}"]`);
                            if (inputEl) {
                                inputEl.value = val.trim();
                                inputEl.style.backgroundColor = '#dcfce7'; 
                                setTimeout(() => inputEl.style.backgroundColor = '', 1000);
                            }
                        }
                    });
                }
            });
        }

        async function saveBulkData() {
            const desa = document.getElementById('filter-desa-tps').value;
            if(!desa) return;

            const inputs = document.querySelectorAll('.bulk-input');
            const batch = db.batch();
            let changeCount = 0;

            const btnSave = document.querySelector('#bulk-save-controls button');
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            btnSave.disabled = true;

            inputs.forEach(input => {
                const val = input.value === '' ? 0 : parseInt(input.value);
                const docId = input.getAttribute('data-docid');
                const partai = input.getAttribute('data-partai');
                const tps = input.getAttribute('data-tps');
                const year = input.getAttribute('data-year');
                const cachedVal = bulkDataCache[year][partai][tps].val;

                if (val !== cachedVal) {
                    const dataPayload = {
                        desa: desa,
                        kategori: currentState.tpsKategori,
                        tahun: year,
                        partai: partai,
                        no_tps: tps,
                        suara: val
                    };

                    if (docId) {
                        const ref = db.collection('data_tps_detail').doc(docId);
                        batch.update(ref, { suara: val });
                    } else if (val > 0) {
                        const newRef = db.collection('data_tps_detail').doc();
                        batch.set(newRef, dataPayload);
                    }
                    changeCount++;
                }
            });

            if (changeCount > 0) {
                try {
                    await batch.commit();
                    alert(`Berhasil menyimpan ${changeCount} perubahan data.`);
                    toggleBulkEditMode(); 
                } catch (e) {
                    console.error(e);
                    alert('Gagal menyimpan batch: ' + e.message);
                }
            } else {
                alert('Tidak ada perubahan data yang terdeteksi.');
            }
            btnSave.innerHTML = originalText;
            btnSave.disabled = false;
        }

        // --- MODAL & CRUD FUNCTIONS (DITAMBAHKAN KEMBALI UNTUK MEMPERBAIKI MASALAH) ---

        function openModal(collection, id = null) {
            currentState.collection = collection;
            currentState.editId = id;
            
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = id ? 'Edit Data' : 'Tambah Data';
            
            const formContainer = document.getElementById('dynamic-form');
            formContainer.innerHTML = generateFormFields(collection);
            
            if (id) {
                // Load data for edit
                db.collection(collection).doc(id).get().then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        Object.keys(data).forEach(key => {
                            const el = document.getElementById(`input-${key}`);
                            if (el) el.value = data[key];
                        });
                        // Trigger logic change for pemilu type if needed
                        if(collection === 'data_pemilu' && data.tipe) togglePemiluFields(data.tipe);
                    }
                });
            } else {
                 // Default logic for new data
                 if(collection === 'data_pemilu') togglePemiluFields('PILEG');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('dynamic-form').innerHTML = '';
        }

        function togglePemiluFields(val) {
           const pilegFields = document.getElementById('pileg-fields');
           const pilkadaFields = document.getElementById('pilkada-fields');
           if(!pilegFields || !pilkadaFields) return;

           if(val === 'PILEG') {
               pilegFields.classList.remove('hidden');
               pilkadaFields.classList.add('hidden');
           } else {
               pilegFields.classList.add('hidden');
               pilkadaFields.classList.remove('hidden');
           }
        }

        function generateFormFields(collection) {
            // Helper to create input HTML
            const createInput = (label, id, type='text', options=null, extraAttr='') => {
                let inputHtml = '';
                if (options) {
                    inputHtml = `<select id="input-${id}" class="w-full border p-2 rounded" ${extraAttr}>
                        <option value="">-- Pilih ${label} --</option>
                        ${options.map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select>`;
                } else {
                    inputHtml = `<input type="${type}" id="input-${id}" class="w-full border p-2 rounded" placeholder="${label}" ${extraAttr}>`;
                }
                return `<div><label class="block text-sm font-bold text-gray-700 mb-1">${label}</label>${inputHtml}</div>`;
            };

            let fields = '';
            
            // Common fields logic based on collection
            if (['pengurus_pac', 'pengurus_ranting', 'pengurus_anak_ranting'].includes(collection)) {
                fields += createInput('No Urut', 'no', 'number');
                
                let jabatanOpts = [];
                if (collection === 'pengurus_pac') jabatanOpts = DATA_MASTER.jabatan_pac;
                if (collection === 'pengurus_ranting') jabatanOpts = DATA_MASTER.jabatan_ranting;
                if (collection === 'pengurus_anak_ranting') jabatanOpts = DATA_MASTER.jabatan_anak_ranting;
                
                fields += createInput('Jabatan', 'jabatan', 'text', jabatanOpts);
                fields += createInput('Nama Lengkap', 'nama');

                // Tambahan: Desa untuk semua struktur
                fields += createInput('Desa', 'desa', 'text', DATA_MASTER.desa);

                if (collection === 'pengurus_pac') {
                    fields += createInput('Alamat', 'alamat');
                }

                if (collection === 'pengurus_ranting') {
				    fields += createInput('Dusun', 'dusun');
                    fields += `<div class="grid grid-cols-2 gap-2">
                        ${createInput('RW', 'rw')}
                        ${createInput('RT', 'rt')}
                    </div>`;
                }

                if (collection === 'pengurus_anak_ranting') {
                    // Dusun hanya untuk Anak Ranting
                    fields += createInput('Dusun', 'dusun');

                    fields += `<div class="grid grid-cols-2 gap-2">
                        ${createInput('RW', 'rw')}
                        ${createInput('RT', 'rt')}
                    </div>`;
                }

                fields += createInput('No Telephone', 'telp');
            }
            
            else if (['data_desa', 'data_tokoh'].includes(collection)) {
                fields += createInput('Desa', 'desa', 'text', DATA_MASTER.desa);
                fields += createInput('Nama', 'nama');
                
                if (collection === 'data_desa') fields += createInput('Jabatan', 'jabatan', 'text', DATA_MASTER.jabatan_desa);
                if (collection === 'data_tokoh') fields += createInput('Ketokohan', 'ketokohan', 'text', DATA_MASTER.ketokohan);
                
                fields += createInput('Alamat', 'alamat');
                fields += createInput('Afiliasi Politik', 'afiliasi', 'text', DATA_MASTER.afiliasi);
                fields += createInput('No Telephone', 'telp');
                if (collection === 'data_desa') fields += createInput('Dusun', 'dusun');
                fields += `<div class="grid grid-cols-2 gap-2">
                    ${createInput('RW', 'rw')}
                    ${createInput('RT', 'rt')}
                 </div>`;
            }
            
            else if (collection === 'data_pemilu') {
                fields += createInput('Tipe Pemilu', 'tipe', 'text', ['PILEG', 'PILKADA'], 'onchange="togglePemiluFields(this.value)"');
                fields += createInput('Tingkat', 'level', 'text', ['KABUPATEN', 'PROVINSI', 'RI']);
                fields += createInput('Desa', 'desa', 'text', DATA_MASTER.desa);
                fields += createInput('Tahun', 'tahun', 'number'); 
                
                fields += `<div class="grid grid-cols-3 gap-2">
                    ${createInput('Jml Penduduk', 'jml_penduduk', 'number')}
                    ${createInput('DPT', 'dpt', 'number')}
                    ${createInput('Jml TPS', 'tps', 'number')}
                </div>`;
                
                const partaiOpts = [...DATA_MASTER.partai_prov_ri, "LAINNYA"];
                
                fields += `<div id="pileg-fields" class="border-t pt-2 mt-2">
                    <h4 class="font-bold text-gray-500 mb-2">Data Suara (Pileg)</h4>
                    ${createInput('Partai', 'partai', 'text', partaiOpts)}
                    ${createInput('Perolehan Suara', 'suara', 'number')}
                </div>`;
                
                fields += `<div id="pilkada-fields" class="border-t pt-2 mt-2 hidden">
                    <h4 class="font-bold text-gray-500 mb-2">Data Pilkada</h4>
                    ${createInput('Nama Pemenang', 'pemenang')}
                    ${createInput('Perolehan Suara', 'suara_pilkada', 'number', null, 'id="input-suara"')} <!-- Reusing ID for simplicity/conflict check -->
                </div>`;
            }
            
            else if (collection === 'data_tps_detail') {
                fields += createInput('Kategori', 'kategori', 'text', ['DPRD', 'DPR-PROV', 'DPR-RI']);
                fields += createInput('Tahun', 'tahun', 'select', ['2024', '2019']);
                fields += createInput('Desa', 'desa', 'text', DATA_MASTER.desa);
                fields += createInput('Nomor TPS', 'no_tps', 'number');
                fields += createInput('Partai', 'partai', 'text', DATA_MASTER.partai_prov_ri);
                fields += createInput('Jumlah Suara', 'suara', 'number');
            }

            return fields;
        }

        async function submitForm() {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = 'Menyimpan...';

            const inputs = document.querySelectorAll('#dynamic-form input, #dynamic-form select');
            const data = {};
            
            inputs.forEach(input => {
                // Skip if hidden
                if(input.offsetParent === null) return;
                
                const key = input.id.replace('input-', '');
                // Special handling for suara pilkada reuse
                if(key === 'suara_pilkada') data['suara'] = input.value;
                else data[key] = input.value;
            });

            try {
                if (currentState.editId) {
                    await db.collection(currentState.collection).doc(currentState.editId).update(data);
                } else {
                    await db.collection(currentState.collection).add(data);
                }
                // closeModal(); // Disabled in PRO version
            } catch (e) {
                alert('Gagal menyimpan: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'SIMPAN';
            }
        }

        function deleteData(collection, id) {
            if(confirm('Yakin ingin menghapus data ini?')) {
                db.collection(collection).doc(id).delete().catch(e => alert(e.message));
            }
        }
    </script>

<!-- Toast Container -->
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script>

// ====== TOAST FUNCTION ======
function showToast(message, type = "success") {
    const toast = document.createElement("div");
    toast.className = `
        px-4 py-2 rounded shadow-lg text-white
        ${type === "success" ? "bg-green-500" : "bg-red-500"}
        transition-opacity duration-300
    `;
    toast.innerText = message;
    document.getElementById("toastContainer").appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

// ====== AUTO FILTER DUSUN ======
document.addEventListener("change", function(e) {
    if (e.target && e.target.id === "desaSelect") {
        const desa = e.target.value;
        const dusunSelect = document.getElementById("dusunSelect");
        if (!dusunSelect) return;

        dusunSelect.innerHTML = '<option value="">Pilih Dusun</option>';

        if (typeof DATA_MASTER !== "undefined" &&
            DATA_MASTER.dusun_mapping &&
            DATA_MASTER.dusun_mapping[desa]) {

            DATA_MASTER.dusun_mapping[desa].forEach(dusun => {
                dusunSelect.innerHTML += 
                    `<option value="${dusun}">${dusun}</option>`;
            });
        }
    }
});

// ====== VALIDASI NOMOR TELEPON ======
document.addEventListener("input", function(e) {
    if (e.target && e.target.name === "no_telp") {
        let value = e.target.value.replace(/\D/g, "");
        if (value.startsWith("8")) {
            value = "0" + value;
        }
        e.target.value = value;
    }
});

</script>
