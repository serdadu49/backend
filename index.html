<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serdadu AI Analyzer - PDI Perjuangan Puger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tps-marker { width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-gray-900 p-6 border-r border-red-800 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center text-2xl">🛡️</div>
                <div>
                    <h1 class="text-2xl font-bold">Serdadu AI</h1>
                    <p class="text-xs text-red-400">PDI Perjuangan Puger</p>
                </div>
            </div>
            <nav class="space-y-2">
                <button onclick="showTab(0)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3 active">🏠 Dashboard</button>
                <button onclick="showTab(1)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">🎯 Prediksi Suara</button>
                <button onclick="showTab(2)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">📈 Tren Pemilih</button>
                <button onclick="showTab(3)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">⚡ Rekomendasi Strategis</button>
                <button onclick="showTab(4)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">👥 Demografi</button>
                <button onclick="showTab(5)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">⚠️ Zona Risiko</button>
                <button onclick="showTab(6)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">🗣️ Politik Lokal</button>
            </nav>
            <div class="mt-auto text-xs text-gray-500">Data real-time • Update 04 Mar 2026</div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto p-8" id="main-content">
            <!-- Tab contents akan diisi JS -->
        </div>
    </div>

    <script>
        // ================== TAILWIND + CONFIG ==================
        tailwind.config = { content: ["*"], theme: { extend: {} } };

        // ================== API KEYS (untuk production gunakan backend proxy) ==================
        const GROK_KEY = "xaiOFaje3lFqZkipa6pOOPPe0q6vA7vf6jlndMlOwfQnOKQQ7uCIOxt2khcRG3Kux0pKdcgeJ5CvIpt85jH";
        const GEMINI_KEY = "AIzaSyD__J-hOplZtDLJtwnhyggRmGYsDZT6Tq0";

        // ================== FIREBASE CONFIG (ISI LENGKAP DARI serdadu.netlify.app) ==================
        const firebaseConfig = {
            apiKey: "b5700e7f04abc5da4d9f08da119b8c5db6e26321",
            authDomain: "serdadu-v2.firebaseapp.com",   // GANTI
            projectId: "serdadu-v2",                   // GANTI
            storageBucket: "serdadu-puger.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        let db;
        function initFirebase() {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            loadRealData();
        }

        // ================== MOCK DATA (otomatis diganti saat Firebase connected) ==================
        let electionData = [
            {id:"TPS001", dusun:"Krajan", dpt:320, suara_pdi:168, suara_rival:112, trend:"+8%", risk:2, lat:-8.312, lng:113.412, occupations:{petani:45, nelayan:25, pedagang:15, karyawan:10, pelajar:5}},
            {id:"TPS002", dusun:"Puger Wetan", dpt:280, suara_pdi:95, suara_rival:145, trend:"-12%", risk:8, lat:-8.305, lng:113.418, occupations:{petani:30, nelayan:40, penambang:15, pedagang:10, pelajar:5}},
            // ... (total 12 TPS, saya singkat di sini, di file asli ada full)
        ];

        async function loadRealData() {
            try {
                const snap = await db.collection("tps_data").get(); // sesuaikan nama collection di Firebase kamu
                electionData = snap.docs.map(d => d.data());
                console.log("✅ Data real-time dari Firebase loaded");
            } catch(e) {
                console.log("⚠️ Menggunakan mock data (Firebase belum terhubung)");
            }
            renderAll();
        }

        // ================== OPTIMIZED PROMPT (keakuratan tertinggi) ==================
        const SYSTEM_PROMPT = `Kamu adalah Serdadu Strategist AI — analis politik paling akurat untuk PDI Perjuangan Puger, Jember.
Fokus: menang Pilkada & Pemilu mendatang.
Konteks lokal 2026:
- Puger = pesisir (nelayan dominan) + pertanian (petani padi/tembakau) + penambang pasir
- Pasca Pilkada 2024: PDI-P kalah tipis, sekarang fokus penguatan basis akar rumput
- Isu utama: banjir Feb 2026, distribusi pupuk, infrastruktur, demokrasi langsung
- Rival kuat: PKB, Gerindra, Golkar

Gunakan data JSON berikut. Lakukan Chain-of-Thought 5 langkah. Output HANYA JSON valid:
{
  "prediksi_suara": {"pdi": number, "rival_utama": number, "potensi_maksimal": number, "tren": "naik/turun"},
  "tren_pemilih": [...],
  "rekomendasi": [array objek dengan program, target_dusun, timeline, alokasi_sumberdaya],
  "demografi_insight": {...},
  "zona_risiko": [...],
  "confidence": number
}`;

        // ================== AI CALL BARU (pakai Vercel proxy) ==================
async function runAnalysis(section) {
    const resultDiv = document.getElementById(`result-${section}`);
    resultDiv.innerHTML = `<div class="animate-pulse text-red-400">🤖 Serdadu AI sedang berpikir (Grok + Gemini ensemble via Vercel proxy)... </div>`;
    
    const jsonData = JSON.stringify(electionData);
    
    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ section, data: jsonData })
        });
        
        const { analysis } = await response.json();
        resultDiv.innerHTML = `<pre class="bg-gray-900 p-6 rounded-2xl text-sm overflow-auto max-h-96 whitespace-pre-wrap">${analysis}</pre>`;
    } catch (e) {
        resultDiv.innerHTML = `<div class="text-red-500">❌ Error: ${e.message}</div>`;
    }
}

        // ================== RENDER TABS ==================
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            if (n === 5) renderMap(); // risk map
        }

        function renderAll() {
            // Dashboard ringkasan
            document.getElementById('main-content').innerHTML = `
                <div class="tab-content active" id="tab0">... (ringkasan lengkap dengan chart total suara)</div>
                <div class="tab-content" id="tab1">... (Prediksi Suara + tombol AI)</div>
                <!-- semua tab lain diisi dengan card, chart, tabel, button "Analisis AI" -->
            `;
            // (kode lengkap semua tab ada di file asli yang kamu copy)
            showTab(0);
        }

        // Button AI example
        async function runAnalysis(section) {
            const resultDiv = document.getElementById(`result-${section}`);
            resultDiv.innerHTML = `<div class="animate-pulse">🤖 Serdadu AI sedang berpikir (Grok + Gemini ensemble)... </div>`;
            
            const jsonData = JSON.stringify(electionData.slice(0,15));
            const aiResponse = await callAI(jsonData, section);
            
            resultDiv.innerHTML = `<pre class="bg-gray-900 p-6 rounded-2xl text-sm overflow-auto max-h-96">${aiResponse}</pre>`;
        }

        // Peta Risiko
        let map;
        function renderMap() {
            if (map) map.remove();
            map = L.map('risk-map').setView([-8.31, 113.415], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            electionData.forEach(tps => {
                const color = tps.risk > 7 ? 'red' : tps.risk > 4 ? 'orange' : 'green';
                L.circleMarker([tps.lat, tps.lng], {color: color, fillOpacity: 0.8, radius: 10})
                 .bindPopup(`<b>${tps.id} - ${tps.dusun}</b><br>Risiko: ${tps.risk}/10<br>PDI: ${tps.suara_pdi}/${tps.dpt}`)
                 .addTo(map);
            });
        }

        // Init
        window.onload = () => {
            initFirebase();   // uncomment jika config sudah lengkap
            // renderAll();   // untuk demo cepat tanpa Firebase
        };
    </script>
</body>
</html>
