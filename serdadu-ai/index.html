<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serdadu AI - Puger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <style>body { font-family: system-ui, sans-serif; } .tab-content { display: none; } .tab-content.active { display: block; }</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex h-screen">
        <div class="w-72 bg-gray-900 p-6 border-r border-red-800 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-3xl">🛡️</div>
                <div><h1 class="text-2xl font-bold text-red-500">Serdadu AI</h1><p class="text-xs text-red-400">Puger</p></div>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="showTab(0)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3 active">🏠 Dashboard</button>
                <button onclick="showTab(1)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">🎯 Prediksi Suara</button>
                <button onclick="showTab(2)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">📈 Tren Pemilih</button>
                <button onclick="showTab(3)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">⚡ Rekomendasi Strategis</button>
                <button onclick="showTab(4)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">👥 Demografi</button>
                <button onclick="showTab(5)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">⚠️ Zona Risiko</button>
                <button onclick="showTab(6)" class="w-full text-left px-4 py-3 rounded-xl hover:bg-gray-800 flex items-center gap-3">🗣️ Politik Lokal</button>
            </nav>
            <div class="text-xs text-gray-500 mt-auto">Real-time • 04 Mar 2026</div>
        </div>
        <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>

    <script>
	 // ================== FIREBASE CONFIG (GANTI DI SINI) ==================
        const firebaseConfig = {
            apiKey: "b5700e7f04abc5da4d9f08da119b8c5db6e26321",
            authDomain: "serdadu-v2.firebaseapp.com",
            projectId: "serdadu-v2",
            storageBucket: "serdadu-v2.firebasestorage.app",
            messagingSenderId: "66160751456",
            appId: "1:66160751456:web:29a9660d5144711f14a405"
        };
        let db;
        function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                loadRealData();
            } catch(e) { console.log("Firebase belum connect, pakai data dummy"); renderAll(); }
        }
        // ================== DATA & RENDER (sama seperti versi mock yang sudah jalan) ==================
        let electionData = [
            {id:"TPS001", dusun:"Krajan", dpt:320, suara_pdi:168, suara_rival:112, trend:"+8%", risk:2, lat:-8.312, lng:113.412, occupations:{petani:45, nelayan:25, pedagang:15, karyawan:10, pelajar:5}},
            {id:"TPS002", dusun:"Puger Wetan", dpt:280, suara_pdi:95, suara_rival:145, trend:"-12%", risk:8, lat:-8.305, lng:113.418, occupations:{petani:30, nelayan:40, penambang:15, pedagang:10, pelajar:5}},
            {id:"TPS003", dusun:"Puger Kulon", dpt:410, suara_pdi:245, suara_rival:98, trend:"+15%", risk:1, lat:-8.318, lng:113.405, occupations:{petani:60, nelayan:10, pedagang:20, karyawan:5, pelajar:5}},
            {id:"TPS004", dusun:"Dusun Baru", dpt:195, suara_pdi:120, suara_rival:65, trend:"+5%", risk:3, lat:-8.298, lng:113.425, occupations:{petani:35, nelayan:30, pedagang:25, karyawan:5, pelajar:5}},
            {id:"TPS005", dusun:"Puger Lor", dpt:350, suara_pdi:210, suara_rival:110, trend:"-3%", risk:6, lat:-8.322, lng:113.398, occupations:{petani:50, nelayan:20, penambang:10, pedagang:15, pelajar:5}},
            {id:"TPS006", dusun:"Krajan Selatan", dpt:240, suara_pdi:85, suara_rival:135, trend:"-18%", risk:9, lat:-8.315, lng:113.430, occupations:{petani:25, nelayan:45, pedagang:20, karyawan:5, pelajar:5}},
            {id:"TPS007", dusun:"Puger Kidul", dpt:290, suara_pdi:175, suara_rival:95, trend:"+12%", risk:4, lat:-8.309, lng:113.410, occupations:{petani:55, nelayan:15, pedagang:15, karyawan:10, pelajar:5}},
            {id:"TPS008", dusun:"Dusun Tengah", dpt:380, suara_pdi:230, suara_rival:120, trend:"+7%", risk:2, lat:-8.328, lng:113.390, occupations:{petani:40, nelayan:25, penambang:20, pedagang:10, pelajar:5}},
            {id:"TPS009", dusun:"Puger Timur", dpt:260, suara_pdi:140, suara_rival:105, trend:"-5%", risk:7, lat:-8.301, lng:113.422, occupations:{petani:30, nelayan:35, pedagang:20, karyawan:10, pelajar:5}},
            {id:"TPS010", dusun:"Krajan Utara", dpt:310, suara_pdi:195, suara_rival:98, trend:"+10%", risk:3, lat:-8.319, lng:113.415, occupations:{petani:50, nelayan:20, pedagang:15, karyawan:10, pelajar:5}},
            {id:"TPS011", dusun:"Puger Barat", dpt:420, suara_pdi:260, suara_rival:130, trend:"+14%", risk:1, lat:-8.312, lng:113.402, occupations:{petani:45, nelayan:15, penambang:10, pedagang:20, pelajar:10}},
            {id:"TPS012", dusun:"Dusun Pantai", dpt:270, suara_pdi:110, suara_rival:140, trend:"-15%", risk:9, lat:-8.295, lng:113.435, occupations:{petani:20, nelayan:55, pedagang:15, karyawan:5, pelajar:5}}
        ];
            async function loadRealData() {
            try {
                const snap = await db.collection("tps_data").get();
                if (!snap.empty) electionData = snap.docs.map(d => d.data());
            } catch(e) {}
            renderAll();
        }

        async function runAnalysis(section) {
            const resultDiv = document.getElementById(`result-${section}`);
            resultDiv.innerHTML = `<div class="animate-pulse text-red-400">🤖 Serdadu AI (Grok + Gemini real) sedang menganalisis...</div>`;
            
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ section, data: JSON.stringify(electionData) })
                });
                const { analysis } = await res.json();
                resultDiv.innerHTML = `<pre class="bg-gray-900 p-6 rounded-2xl text-sm overflow-auto max-h-96 whitespace-pre-wrap">${analysis}</pre>`;
            } catch(e) {
                resultDiv.innerHTML = `<div class="text-red-500">❌ Error: ${e.message}</div>`;
            }
        }
// ================== RENDER SEMUA TAB LENGKAP ==================
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            if (n === 5) setTimeout(renderMap, 100);
        }

        function renderAll() {
            const html = `
                <!-- TAB 0 Dashboard -->
                <div class="tab-content active" id="tab0">
                    <h2 class="text-3xl font-bold mb-6">Dashboard Real-time PDI Perjuangan Puger</h2>
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-gray-900 p-6 rounded-2xl"><h3 class="text-red-400">Total Suara PDI-P</h3><p class="text-5xl font-bold mt-2">2.184</p><p class="text-green-400 text-sm">+14% dari 2024</p></div>
                        <div class="bg-gray-900 p-6 rounded-2xl"><h3 class="text-red-400">Rata-rata per TPS</h3><p class="text-5xl font-bold mt-2">182</p></div>
                        <div class="bg-gray-900 p-6 rounded-2xl"><h3 class="text-red-400">TPS Berisiko Tinggi</h3><p class="text-5xl font-bold mt-2 text-orange-400">3</p></div>
                    </div>
                    <canvas id="totalChart" class="mt-8 bg-gray-900 p-6 rounded-2xl"></canvas>
                </div>

                <!-- TAB 1 Prediksi Suara -->
                <div class="tab-content" id="tab1">
                    <h2 class="text-3xl font-bold mb-6">🎯 Prediksi Perolehan Suara</h2>
                    <button onclick="runAnalysis('Prediksi Suara')" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl mb-6">🔮 Analisis AI Sekarang</button>
                    <div id="result-Prediksi Suara" class="bg-gray-900 p-6 rounded-2xl"></div>
                </div>

                <!-- TAB 2 Tren Pemilih -->
                <div class="tab-content" id="tab2">
                    <h2 class="text-3xl font-bold mb-6">📈 Analisis Tren Pemilih</h2>
                    <button onclick="runAnalysis('Tren Pemilih')" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl mb-6">📊 Analisis AI Sekarang</button>
                    <div id="result-Tren Pemilih" class="bg-gray-900 p-6 rounded-2xl"></div>
                </div>

                <!-- TAB 3 Rekomendasi Strategis -->
                <div class="tab-content" id="tab3">
                    <h2 class="text-3xl font-bold mb-6">⚡ Rekomendasi Strategis</h2>
                    <button onclick="runAnalysis('Rekomendasi Strategis')" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl mb-6">🚀 Analisis AI Sekarang</button>
                    <div id="result-Rekomendasi Strategis" class="bg-gray-900 p-6 rounded-2xl"></div>
                </div>

                <!-- TAB 4 Demografi -->
                <div class="tab-content" id="tab4">
                    <h2 class="text-3xl font-bold mb-6">👥 Statistik Demografi</h2>
                    <button onclick="runAnalysis('Demografi')" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl mb-6">📋 Analisis AI Sekarang</button>
                    <div id="result-Demografi" class="bg-gray-900 p-6 rounded-2xl"></div>
                </div>

                <!-- TAB 5 Zona Risiko -->
                <div class="tab-content" id="tab5">
                    <h2 class="text-3xl font-bold mb-6">⚠️ Zona Risiko TPS & Dusun</h2>
                    <div id="risk-map" class="h-96 bg-gray-900 rounded-2xl"></div>
                </div>

                <!-- TAB 6 Politik Lokal -->
                <div class="tab-content" id="tab6">
                    <h2 class="text-3xl font-bold mb-6">🗣️ Kondisi Politik Lokal Jember 2026</h2>
                    <button onclick="runAnalysis('Politik Lokal')" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-xl mb-6">🧠 Analisis AI Sekarang</button>
                    <div id="result-Politik Lokal" class="bg-gray-900 p-6 rounded-2xl"></div>
                </div>
            `;
            document.getElementById('main-content').innerHTML = html;

            // Chart Dashboard
            new Chart(document.getElementById('totalChart'), {
                type: 'bar',
                data: {
                    labels: electionData.map(t => t.dusun),
                    datasets: [{ label: 'Suara PDI-P', data: electionData.map(t => t.suara_pdi), backgroundColor: '#dc2626' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        function renderMap() {
            const map = L.map('risk-map').setView([-8.31, 113.415], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            electionData.forEach(tps => {
                const color = tps.risk > 7 ? '#ef4444' : tps.risk > 4 ? '#f59e0b' : '#22c55e';
                L.circleMarker([tps.lat, tps.lng], {color, fillOpacity: 0.9, radius: 12})
                    .bindPopup(`<b>${tps.id} - ${tps.dusun}</b><br>Risiko: ${tps.risk}/10<br>PDI: ${tps.suara_pdi}/${tps.dpt}`)
                    .addTo(map);
            });
        }

        // ================== INIT ==================
        window.onload = () => {
            renderAll();
            showTab(0);
            initFirebase();
        };
        // (renderAll, showTab, renderMap, chart, Firebase config — persis sama seperti versi mock yang sudah jalan)
        // Copy bagian renderAll, showTab, renderMap, chart, dan Firebase dari file mock kamu yang sudah berhasil.
    </script>
</body>
</html>
